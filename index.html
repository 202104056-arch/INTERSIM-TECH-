<!DOCTYPE html>
<html>
<head>
  <title>Mapa Inmobiliario PRO</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    h2 {
      text-align: center;
      margin: 10px;
    }

    #filtro {
      display: block;
      margin: 10px auto;
      padding: 8px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🏠 Mapa Inmobiliario PRO</h2>

<select id="filtro">
  <option value="todos">Todos</option>
  <option value="venta">Venta</option>
  <option value="alquiler">Alquiler</option>
</select>

<div id="map"></div>

<script>
  // 📍 MAPA CENTRADO EN COCHABAMBA
  var map = L.map('map').setView([-17.39, -66.15], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 🏠 PROPIEDADES
  var lugares = [
    {
      lat: -17.39,
      lng: -66.15,
      tipo: "venta",
      nombre: "Casa Moderna - Cala Cala",
      precio: "$120,000",
      imagen: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
      descripcion: "Casa moderna con jardín, 3 habitaciones y garaje."
    },
    {
      lat: -17.41,
      lng: -66.17,
      tipo: "alquiler",
      nombre: "Departamento Centro",
      precio: "$350/mes",
      imagen: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688",
      descripcion: "Departamento céntrico, ideal para estudiantes."
    },
    {
      lat: -17.37,
      lng: -66.16,
      tipo: "venta",
      nombre: "Casa Familiar - Queru Queru",
      precio: "$95,000",
      imagen: "https://images.unsplash.com/photo-1570129477492-45c003edd2be",
      descripcion: "Casa amplia en zona residencial tranquila."
    },
    {
      lat: -17.42,
      lng: -66.13,
      tipo: "alquiler",
      nombre: "Mini Departamento Sopocachi",
      precio: "$280/mes",
      imagen: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267",
      descripcion: "Ideal para una persona o pareja."
    }
  ];

  var markers = [];

  // 📌 MOSTRAR PINS
  function mostrar(filtro) {

    // borrar anteriores
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    lugares.forEach(l => {

      if (filtro === "todos" || l.tipo === filtro) {

        var marker = L.marker([l.lat, l.lng]).addTo(map);

        var popupContent = `
          <div style="width:260px;font-family:Arial">

            <img src="${l.imagen}"
              style="width:100%;height:140px;object-fit:cover;border-radius:10px;">

            <h3 style="margin:8px 0;">${l.nombre}</h3>

            <p style="margin:4px 0;"><b>Precio:</b> ${l.precio}</p>

            <p style="margin:4px 0;font-size:13px;color:#555;">
              ${l.descripcion}
            </p>

            <span style="
              background:${l.tipo === 'venta' ? '#28a745' : '#ff9800'};
              color:white;
              padding:4px 8px;
              border-radius:6px;
              font-size:12px;
            ">
              ${l.tipo}
            </span>

            <br><br>

            <button onclick="alert('Propiedad: ${l.nombre}')"
              style="
                width:100%;
                padding:8px;
                background:#007bff;
                color:white;
                border:none;
                border-radius:8px;
              ">
              Ver propiedad
            </button>

          </div>
        `;

        marker.bindPopup(popupContent);

        markers.push(marker);
      }
    });
  }

  // 🔍 FILTRO
  document.getElementById("filtro").addEventListener("change", function() {
    mostrar(this.value);
  });

  // inicial
  mostrar("todos");

</script>

</body>
</html>
