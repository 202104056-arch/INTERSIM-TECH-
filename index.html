<!DOCTYPE html>
<html>
<head>
  <title>Cochatech Inmobiliaria</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    /* 🟦 TOP BAR */
    #topbar {
      background: #0d47a1;
      color: white;
      display: flex;
      align-items: center;
      padding: 10px 20px;
    }

    #logo {
      font-weight: bold;
      font-size: 18px;
      margin-right: 20px;
    }

    #topbar span {
      font-size: 14px;
      opacity: 0.9;
    }

    /* 📊 LAYOUT */
    #container {
      display: flex;
      height: calc(100vh - 50px);
    }

    /* 🧩 PANEL */
    #panel {
      width: 300px;
      background: white;
      padding: 15px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      overflow-y: auto;
    }

    .section {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #f7f7f7;
    }

    button, select, input {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      background: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0d47a1;
    }

    /* 🗺️ MAPA */
    #map {
      flex: 1;
    }

  </style>
</head>

<body>

<!-- 🟦 TOP BAR -->
<div id="topbar">
  <div id="logo">🏠 COCHATECH</div>
  <span>Sistema Inmobiliario Inteligente</span>
</div>

<div id="container">

  <!-- 📊 PANEL -->
  <div id="panel">

    <div class="section">
      <h4>📍 Ubicación</h4>
      <input id="ubicacion" placeholder="Cala Cala, Centro..." />
    </div>

    <div class="section">
      <h4>🏷️ Operación</h4>
      <button onclick="setOperacion('todos')">Todos</button>
      <button onclick="setOperacion('compra')">Compra</button>
      <button onclick="setOperacion('alquiler')">Alquiler</button>
      <button onclick="setOperacion('anticretico')">Anticrético</button>
    </div>

    <div class="section">
      <h4>🏠 Tipo</h4>
      <button onclick="setTipo('todos')">Todos</button>
      <button onclick="setTipo('casa')">Casa</button>
      <button onclick="setTipo('departamento')">Departamento</button>
      <button onclick="setTipo('habitacion')">Habitación</button>
      <button onclick="setTipo('tienda')">Tienda</button>
      <button onclick="setTipo('terreno')">Terreno</button>
    </div>

    <div class="section">
      <h4>💰 Precio</h4>
      <input id="min" type="number" placeholder="Mínimo" />
      <input id="max" type="number" placeholder="Máximo" />
    </div>

    <button onclick="aplicarFiltros()">🔍 Buscar</button>

  </div>

  <!-- 🗺️ MAPA -->
  <div id="map"></div>

</div>

<script>

  var map = L.map('map').setView([-17.39, -66.15], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  let filtroOperacion = "todos";
  let filtroTipo = "todos";

  function setOperacion(v){ filtroOperacion = v; }
  function setTipo(v){ filtroTipo = v; }

  var lugares = [
    {
      lat: -17.39,
      lng: -66.15,
      zona: "Cala Cala",
      operacion: "compra",
      tipo: "casa",
      precio: 120000,
      nombre: "Casa Moderna",
      imagen: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
      descripcion: "Casa con jardín y garaje"
    },
    {
      lat: -17.41,
      lng: -66.17,
      zona: "Centro",
      operacion: "alquiler",
      tipo: "departamento",
      precio: 350,
      nombre: "Depto Centro",
      imagen: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688",
      descripcion: "Ideal estudiantes"
    }
  ];

  var markers = [];

  function abrirModal(l){
    alert(l.nombre + " - " + l.precio);
  }

  function aplicarFiltros(){

    let zona = document.getElementById("ubicacion").value.toLowerCase();
    let min = document.getElementById("min").value;
    let max = document.getElementById("max").value;

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    let bounds = [];

    lugares.forEach(l => {

      let okZona = zona === "" || l.zona.toLowerCase().includes(zona);
      let okOp = filtroOperacion === "todos" || l.operacion === filtroOperacion;
      let okTipo = filtroTipo === "todos" || l.tipo === filtroTipo;
      let okMin = !min || l.precio >= min;
      let okMax = !max || l.precio <= max;

      if(okZona && okOp && okTipo && okMin && okMax){

        let marker = L.marker([l.lat, l.lng]).addTo(map);

        marker.bindPopup(`
          <b>${l.nombre}</b><br>
          ${l.zona}<br>
          Bs ${l.precio}
        `);

        markers.push(marker);
        bounds.push([l.lat, l.lng]);
      }
    });

    if(bounds.length){
      map.fitBounds(bounds, {padding:[50,50]});
    }
  }

  aplicarFiltros();

</script>

</body>
</html>
