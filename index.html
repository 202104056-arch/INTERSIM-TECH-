<!DOCTYPE html>
<html>
<head>
  <title>Mapa Inmobiliario PRO</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; margin: 0; }

    h2 { text-align:center; margin:10px; }

    #filters {
      padding:10px;
      text-align:center;
      background:#f5f5f5;
    }

    input, select {
      margin:5px;
      padding:6px;
    }

    #map {
      height: 80vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🏠 Mapa Inmobiliario PRO</h2>

<!-- 🔍 FILTROS -->
<div id="filters">

  <input id="ubicacion" placeholder="Zona (Cala Cala, Centro...)" />

  <select id="operacion">
    <option value="todos">Operación</option>
    <option value="anticretico">Anticrético</option>
    <option value="alquiler">Alquiler</option>
    <option value="compra">Compra</option>
  </select>

  <select id="tipo">
    <option value="todos">Tipo</option>
    <option value="casa">Casa</option>
    <option value="departamento">Departamento</option>
    <option value="habitacion">Habitación</option>
    <option value="tienda">Tienda</option>
    <option value="terreno">Terreno</option>
  </select>

  <input id="min" type="number" placeholder="Precio min" />
  <input id="max" type="number" placeholder="Precio max" />

  <button onclick="aplicarFiltros()">Buscar</button>
</div>

<div id="map"></div>

<!-- 🧾 MODAL -->
<div id="modal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    width:320px;
    padding:15px;
    border-radius:12px;
    position:relative;
  ">

    <span onclick="cerrarModal()" style="
      position:absolute;
      top:8px;
      right:12px;
      cursor:pointer;
      font-size:18px;
    ">✖</span>

    <img id="imgModal" style="width:100%;border-radius:10px;">
    <h3 id="tituloModal"></h3>
    <p id="precioModal"></p>
    <p id="descModal"></p>

  </div>
</div>

<script>

  // 🗺️ MAPA
  var map = L.map('map').setView([-17.39, -66.15], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 🏠 PROPIEDADES
  var lugares = [
    {
      lat: -17.39,
      lng: -66.15,
      zona: "Cala Cala",
      operacion: "compra",
      tipo: "casa",
      precio: 120000,
      nombre: "Casa moderna Cala Cala",
      imagen: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
      descripcion: "Casa amplia con jardín"
    },
    {
      lat: -17.41,
      lng: -66.17,
      zona: "Centro",
      operacion: "alquiler",
      tipo: "departamento",
      precio: 350,
      nombre: "Depto centro",
      imagen: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688",
      descripcion: "Ideal estudiantes"
    },
    {
      lat: -17.37,
      lng: -66.16,
      zona: "Queru Queru",
      operacion: "anticretico",
      tipo: "casa",
      precio: 50000,
      nombre: "Casa anticrético",
      imagen: "https://images.unsplash.com/photo-1570129477492-45c003edd2be",
      descripcion: "Zona tranquila"
    },
    {
      lat: -17.42,
      lng: -66.13,
      zona: "Sopocachi",
      operacion: "compra",
      tipo: "terreno",
      precio: 80000,
      nombre: "Terreno amplio",
      imagen: "https://images.unsplash.com/photo-1500382017468-9049fed747ef",
      descripcion: "Ideal construcción"
    }
  ];

  var markers = [];

  // 📄 MODAL
  function abrirModal(l) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imgModal").src = l.imagen;
    document.getElementById("tituloModal").innerText = l.nombre;
    document.getElementById("precioModal").innerText = "Bs " + l.precio;
    document.getElementById("descModal").innerText = l.descripcion;
  }

  function cerrarModal() {
    document.getElementById("modal").style.display = "none";
  }

  // 🔍 FILTROS COMPLETOS
  function aplicarFiltros() {

    let zona = document.getElementById("ubicacion").value.toLowerCase();
    let operacion = document.getElementById("operacion").value;
    let tipo = document.getElementById("tipo").value;
    let min = document.getElementById("min").value;
    let max = document.getElementById("max").value;

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    let bounds = [];

    lugares.forEach(l => {

      let okZona = zona === "" || l.zona.toLowerCase().includes(zona);
      let okOp = operacion === "todos" || l.operacion === operacion;
      let okTipo = tipo === "todos" || l.tipo === tipo;
      let okMin = !min || l.precio >= min;
      let okMax = !max || l.precio <= max;

      if (okZona && okOp && okTipo && okMin && okMax) {

        let marker = L.marker([l.lat, l.lng]).addTo(map);

        marker.bindPopup(`
          <div style="width:220px">
            <img src="${l.imagen}" style="width:100%;height:110px;object-fit:cover;border-radius:8px;">
            <h3>${l.nombre}</h3>
            <p><b>Bs ${l.precio}</b></p>
            <button onclick='abrirModal(${JSON.stringify(l).replace(/'/g,"&apos;")})'>
              Ver propiedad
            </button>
          </div>
        `);

        markers.push(marker);
        bounds.push([l.lat, l.lng]);
      }
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  }

  // INICIO
  aplicarFiltros();

</script>

</body>
</html>
