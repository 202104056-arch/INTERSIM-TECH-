<!DOCTYPE html>
<html>
<head>
  <title>Mapa Inmobiliario PRO</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    h2 {
      text-align: center;
      margin: 10px;
    }

    #filtro {
      display: block;
      margin: 10px auto;
      padding: 8px;
    }

    #map {
      height: 85vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🏠 Mapa Inmobiliario PRO</h2>

<select id="filtro">
  <option value="todos">Todos</option>
  <option value="venta">Venta</option>
  <option value="alquiler">Alquiler</option>
</select>

<div id="map"></div>

<!-- 🧾 MODAL -->
<div id="modal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    width:320px;
    padding:15px;
    border-radius:12px;
    position:relative;
  ">

    <span onclick="cerrarModal()" style="
      position:absolute;
      top:8px;
      right:12px;
      cursor:pointer;
      font-size:18px;
    ">✖</span>

    <img id="imgModal" style="width:100%;border-radius:10px;">
    <h3 id="tituloModal"></h3>
    <p id="precioModal"></p>
    <p id="descModal"></p>

  </div>
</div>

<script>

  // 🗺️ MAPA
  var map = L.map('map').setView([-17.39, -66.15], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 🏠 PROPIEDADES
  var lugares = [
    {
      lat: -17.39,
      lng: -66.15,
      tipo: "venta",
      nombre: "Casa Moderna - Cala Cala",
      precio: "$120,000",
      imagen: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
      descripcion: "Casa moderna con jardín y 3 habitaciones."
    },
    {
      lat: -17.41,
      lng: -66.17,
      tipo: "alquiler",
      nombre: "Departamento Centro",
      precio: "$350/mes",
      imagen: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688",
      descripcion: "Departamento céntrico ideal para estudiantes."
    },
    {
      lat: -17.37,
      lng: -66.16,
      tipo: "venta",
      nombre: "Casa Familiar Queru Queru",
      precio: "$95,000",
      imagen: "https://images.unsplash.com/photo-1570129477492-45c003edd2be",
      descripcion: "Zona tranquila con patio amplio."
    }
  ];

  var markers = [];

  // 📄 MODAL
  function abrirModal(l) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("imgModal").src = l.imagen;
    document.getElementById("tituloModal").innerText = l.nombre;
    document.getElementById("precioModal").innerText = l.precio;
    document.getElementById("descModal").innerText = l.descripcion;
  }

  function cerrarModal() {
    document.getElementById("modal").style.display = "none";
  }

  // 📍 MOSTRAR + FILTRO + AUTO ZOOM
  function mostrar(filtro) {

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    let bounds = [];

    lugares.forEach(l => {

      if (filtro === "todos" || l.tipo === filtro) {

        var marker = L.marker([l.lat, l.lng]).addTo(map);

        let popupContent = `
          <div style="width:200px">
            <img src="${l.imagen}" style="width:100%;height:100px;object-fit:cover;border-radius:8px;">
            <h3>${l.nombre}</h3>
            <p><b>${l.precio}</b></p>
            <button onclick='abrirModal(${JSON.stringify(l).replace(/'/g,"&apos;")})'>
              Ver propiedad
            </button>
          </div>
        `;

        marker.bindPopup(popupContent);

        markers.push(marker);
        bounds.push([l.lat, l.lng]);
      }
    });

    // 🗺️ AUTO-ZOOM (reduce área según filtro)
    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  }

  // 🔍 FILTRO
  document.getElementById("filtro").addEventListener("change", function() {
    mostrar(this.value);
  });

  // INICIO
  mostrar("todos");

</script>

</body>
</html>
